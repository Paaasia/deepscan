<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Scan Pro v1.2</title>
    <style>
        body { font-family: sans-serif; background: #020617; color: #e2e8f0; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid #1e293b; margin-bottom: 15px; }
        
        button { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        
        .btn-connect { background: #2563eb; color: white; margin-bottom: 20px; }
        .btn-scan-all { background: #8b5cf6; color: white; border: 2px solid #a78bfa; margin-bottom: 20px; }
        .btn-system { background: #1e293b; color: #f1f5f9; font-size: 0.9rem; }
        .btn-clear { background: #7f1d1d; color: #fecaca; display: none; margin-top: 10px; }

        #console { 
            margin-top: 20px; background: #000; color: #10b981; font-family: monospace; 
            padding: 12px; border-radius: 8px; font-size: 0.75rem; height: 140px; 
            overflow-y: auto; border: 1px solid #064e3b;
        }
        .result-area {
            margin-top: 15px; padding: 15px; background: #111827; border-radius: 12px;
            border-left: 4px solid #8b5cf6; min-height: 60px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color: #8b5cf6;">DEEP SCAN PRO</h2>
        <p style="font-size: 0.75rem; color: #64748b;">Automated Multi-System Diagnostics</p>
    </div>

    <button id="connectBtn" class="btn-connect">YHDISTÄ LUKIJAA</button>

    <!-- UUSI SCAN ALL -NAPPI -->
    <button id="scanAllBtn" class="btn-scan-all" onclick="scanAllSystems()">
        🚀 SKANNAA KAIKKI JÄRJESTELMÄT
    </button>

    <div id="systemButtons">
        <button class="btn-system" onclick="scanSingle('ABS')">Lue ABS <span>➔</span></button>
        <button class="btn-system" onclick="scanSingle('AIRBAG')">Lue Airbag <span>➔</span></button>
        <button class="btn-system" onclick="scanSingle('TRANSMISSION')">Lue Vaihteisto <span>➔</span></button>
    </div>

    <div class="result-area">
        <div id="diagResult">Valmis skannaamaan...</div>
        <button id="clearBtn" class="btn-clear" onclick="clearDTCs()">⚠️ NOLLAA VIKAKOODIT</button>
    </div>

    <div id="console">Loki: Odota yhteyttä...</div>
</div>

<script>
    let device, characteristic;
    let currentSystem = null, currentAddr = null;
    const decoder = new TextDecoder();
    const encoder = new TextEncoder();

    // Laajennettu osoitelista mm. Ranskalaisia varten
    const SYSTEM_CONFIG = {
        'ABS': ['7E2', '03', 'F1', 'E8'],
        'AIRBAG': ['7E3', '15', '51', 'EA'],
        'TRANSMISSION': ['7E1', '18'],
        'STEERING': ['7E4', '44', '30']
    };

    function log(msg) {
        const c = document.getElementById('console');
        c.innerHTML += `> ${msg}<br>`;
        c.scrollTop = c.scrollHeight;
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'NexLink' }, { namePrefix: 'OBD' }],
                optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
            });
            const gatt = await device.gatt.connect();
            const service = await gatt.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
            characteristic = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');
            log("Yhteys ok. Alustetaan...");
            await sendCommand("AT Z");
            await sendCommand("AT SP 0");
            document.getElementById('connectBtn').innerText = "YHDISTETTY";
            document.getElementById('connectBtn').style.background = "#059669";
        } catch (e) { log("Virhe: " + e.message); }
    });

    async function sendCommand(cmd, timeout = 1000) {
        if (!characteristic) return "ERR";
        await characteristic.writeValue(encoder.encode(cmd + '\r'));
        await new Promise(r => setTimeout(r, timeout));
        const value = await characteristic.readValue();
        return decoder.decode(value).replace(/>/g, '').trim();
    }

    async function scanSingle(sysName) {
        if (!characteristic) { alert("Yhdistä ensin!"); return; }
        document.getElementById('clearBtn').style.display = "none";
        document.getElementById('diagResult').innerHTML = `Etsitään: ${sysName}...`;
        
        let found = await performScan(sysName);
        if (!found) document.getElementById('diagResult').innerHTML = "Ei vastausta.";
    }

    async function scanAllSystems() {
        if (!characteristic) { alert("Yhdistä ensin!"); return; }
        log("Aloitetaan täysskannaus...");
        let results = [];
        
        for (let sys in SYSTEM_CONFIG) {
            document.getElementById('diagResult').innerHTML = `Skannataan: ${sys}...`;
            let res = await performScan(sys);
            if (res) results.push(sys);
        }
        
        document.getElementById('diagResult').innerHTML = results.length > 0 
            ? `<b>Löytyi:</b> ${results.join(', ')}<br><small>Valitse järjestelmä alta nollataksesi.</small>`
            : "Ei löytyneitä järjestelmiä.";
    }

    async function performScan(sysName) {
        for (let addr of SYSTEM_CONFIG[sysName]) {
            log(`Check ${sysName} @ ${addr}...`);
            await sendCommand(`AT SH ${addr}`);
            let res = await sendCommand("19 02 FF 00"); // UDS
            if (res.includes("NO DATA") || res.includes("ERROR")) res = await sendCommand("03"); // KWP
            
            if (res.length > 2 && !res.includes("ERROR") && !res.includes("NO DATA")) {
                currentSystem = sysName;
                currentAddr = addr;
                document.getElementById('diagResult').innerHTML = `<b>${sysName} (${addr}):</b><br>${res}`;
                document.getElementById('clearBtn').style.display = "block";
                return true;
            }
        }
        return false;
    }

    async function clearDTCs() {
        if (!confirm("Nollataanko " + currentSystem + "?")) return;
        log(`Resetting ${currentAddr}...`);
        await sendCommand(`AT SH ${currentAddr}`);
        await sendCommand("14 FF FF FF"); // UDS clear
        await sendCommand("04");          // Std clear
        document.getElementById('diagResult').innerHTML = "Nollattu. Lue uudelleen.";
        document.getElementById('clearBtn').style.display = "none";
        await sendCommand("AT SH 7DF");
    }
</script>
</body>
</html>
